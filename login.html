<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DeshiKarigor — Login</title>
  <!-- Tailwind CDN for quick prototyping -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6" style="background-color: #FFF1F2;">
  <main class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">
    <!-- Brand / header -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-green-600 flex items-center justify-center text-white font-bold">DK</div>
        <span class="text-2xl font-semibold text-gray-800">DeshiKarigor</span>
      </div>
      <p class="text-sm text-gray-500 mt-2">Connect with trusted local workers across Bangladesh</p>
    </div>

    <!-- Form -->
    <form id="loginForm" action="#" method="POST" class="space-y-5" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email or phone</label>
        <input
          id="email"
          name="email"
          type="text"
          inputmode="email"
          required
          autocomplete="username"
          placeholder="you@example.com or 01XXXXXXXXX"
          class="mt-2 block w-full rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm text-gray-800 placeholder-gray-400 focus:border-green-500 focus:ring-2 focus:ring-green-100 outline-none"
          aria-describedby="emailHelp"
        />
        <p id="emailHelp" class="sr-only">We will never share your email. Required.</p>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <div class="mt-2 relative">
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            placeholder="Enter your password"
            class="peer block w-full rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm text-gray-800 placeholder-gray-400 focus:border-green-500 focus:ring-2 focus:ring-green-100 outline-none"
          />
          <button
            type="button"
            id="togglePwd"
            aria-label="Show password"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-sm text-gray-500 hover:text-gray-700"
          >Show</button>
        </div>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="inline-flex items-center gap-2">
          <input type="checkbox" name="remember" class="h-4 w-4 rounded border-gray-300 text-green-600 focus:ring-green-500" />
          <span class="text-gray-600">Remember me</span>
        </label>
        <a href="#" class="text-green-600 hover:underline">Forgot password?</a>
      </div>

      <div>
        <button
          type="submit"
          class="w-full inline-flex items-center justify-center gap-2 rounded-lg bg-green-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-200"
        >
          <a href="index.html">Log in</a>
        </button>
      </div>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <hr class="flex-1 border-gray-200" />
      <span class="text-xs text-gray-400">or</span>
      <hr class="flex-1 border-gray-200" />
    </div>

    <!-- Social / quick login -->
    <div class="space-y-3">
      <button class="w-full inline-flex items-center justify-center gap-3 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden class="opacity-80"><path d="M22 12a10 10 0 1 0-11.5 9.9v-7H7.9v-3h2.6V9.1c0-2.6 1.5-4 3.8-4 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.3 0-1.7.8-1.7 1.6V12h2.9l-.5 3h-2.4v7A10 10 0 0 0 22 12z" fill="#1877F2"/></svg>
        Continue with Facebook
      </button>

      <button class="w-full inline-flex items-center justify-center gap-3 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden class="opacity-80"><path d="M21.8 13.2c-.1-.3-.4-.4-.7-.4H12v3.6h5.6c-.9 2.5-3.3 4.6-6.6 4.6-3.9 0-7-3.1-7-7s3.1-7 7-7c1.9 0 3.6.7 4.9 1.9l2.2-2.2C18.6 4 15.5 3 12 3 6 3 1 8 1 14s5 11 11 11c6 0 11-5 11-11 0-.6-.1-1.2-.2-1.8z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- Signup link -->
    <p class="text-center text-sm text-gray-600 mt-6">
      Don't have an account?
      <a href="Singup.html" class="text-green-600 font-medium hover:underline">Sign up</a>
    </p>
  </main>

  <!-- Small JS: toggle password & basic validation UX -->
  <script>
    (function () {
      const pwd = document.getElementById('password');
      const toggle = document.getElementById('togglePwd');
      toggle.addEventListener('click', () => {
        if (pwd.type === 'password') {
          pwd.type = 'text';
          toggle.textContent = 'Hide';
          toggle.setAttribute('aria-label', 'Hide password');
        } else {
          pwd.type = 'password';
          toggle.textContent = 'Show';
          toggle.setAttribute('aria-label', 'Show password');
        }
      });

      // Basic client-side feedback: highlight invalid fields on submit
      const form = document.getElementById('loginForm');
      form.addEventListener('submit', (e) => {
        if (!form.checkValidity()) {
          e.preventDefault();
          // find first invalid element and focus it
          const firstInvalid = form.querySelector(':invalid');
          if (firstInvalid) firstInvalid.focus();
          // add a subtle shake or red border could be added here
        }
      });
    })();
  </script>
</body>
</html>
